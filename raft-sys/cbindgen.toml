language = "C"
include_guard = "RAFT_SYS_H"
pragma_once = true
header = "/* Generated by cbindgen. Do not edit by hand. */"
no_includes = false
sys_includes = ["stdint.h", "stddef.h", "stdbool.h"]
cpp_compat = true
documentation = true
documentation_style = "c99"

[parse]
parse_deps = false

[export]
prefix = ""

[export.rename]
"RaftNode" = "RaftNode"
